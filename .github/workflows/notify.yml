name: Daily Calendar Notifications

on:
  schedule:
    # Cover both CET (UTC+1) and CEST (UTC+2) for 8am/3:30pm/8pm local
    - cron: '0 6 * * *'     # 8am CEST (summer)
    - cron: '0 7 * * *'     # 8am CET (winter)
    - cron: '30 13 * * *'   # 3:30pm CEST (summer)
    - cron: '30 14 * * *'   # 3:30pm CET (winter)
    - cron: '0 18 * * *'    # 8pm CEST (summer)
    - cron: '0 19 * * *'    # 8pm CET (winter)
  workflow_dispatch:
    inputs:
      type:
        description: 'Notification type'
        required: true
        default: 'summary'
        type: choice
        options:
          - summary
          - pickup

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Send notification
        run: |
          # Get dates and time in Europe/Madrid timezone
          TOMORROW=$(TZ="Europe/Madrid" date -d "+1 day" +%Y-%m-%d)
          TODAY=$(TZ="Europe/Madrid" date +%Y-%m-%d)
          HOUR=$(TZ="Europe/Madrid" date +%H)
          MINUTE=$(TZ="Europe/Madrid" date +%M)
          LOCAL_TIME="${HOUR}:${MINUTE}"

          # For scheduled runs, only run at exact local times
          # (skips the duplicate UTC trigger for the wrong season)
          # Manual runs (workflow_dispatch) always go through
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "$HOUR" != "08" ] && [ "$HOUR" != "15" ] && [ "$HOUR" != "20" ]; then
              echo "Not a target hour (hour=$HOUR), skipping"
              exit 0
            fi
          fi

          # Check if markers.json exists
          if [ ! -f data/markers.json ]; then
            echo "No markers file found, skipping"
            exit 0
          fi

          MARKERS=$(cat data/markers.json)

          # --- 3:30pm pickup notification ---
          MANUAL_TYPE="${{ github.event.inputs.type }}"
          if [ "$HOUR" = "15" ] || [ "$MANUAL_TYPE" = "pickup" ]; then
            DOW=$(TZ="Europe/Madrid" date -d "$TODAY" +%u)
            IS_WEEKEND=false
            if [ "$DOW" = "6" ] || [ "$DOW" = "7" ]; then
              IS_WEEKEND=true
            fi

            # Only send if: weekday + custody (purple) + no school holiday (no orange)
            HAS_CUSTODY=$(echo "$MARKERS" | jq -r --arg d "$TODAY" 'if .[$d] then (if (.[$d] | index("custody")) then "yes" else "no" end) else "no" end')
            HAS_SCHOOL_HOLIDAY=$(echo "$MARKERS" | jq -r --arg d "$TODAY" 'if .[$d] then (if (.[$d] | index("school")) then "yes" else "no" end) else "no" end')

            if [ "$IS_WEEKEND" = "false" ] && [ "$HAS_CUSTODY" = "yes" ] && [ "$HAS_SCHOOL_HOLIDAY" = "no" ]; then
              echo "Sending pickup notification"
              curl -s \
                -H "Title: MyCalendar" \
                -H "Tags: sparkles" \
                -H "Priority: high" \
                -d "Ella: pick up from school" \
                https://ntfy.sh/mycalendar
            else
              echo "No pickup needed today (weekend=$IS_WEEKEND, custody=$HAS_CUSTODY, school_holiday=$HAS_SCHOOL_HOLIDAY)"
            fi
            exit 0
          fi

          # --- 8am / 8pm daily summary notification ---
          if [ "$HOUR" -lt 12 ]; then
            TARGET_DATE="$TODAY"
          else
            TARGET_DATE="$TOMORROW"
          fi

          echo "Target date: $TARGET_DATE"

          DOW=$(TZ="Europe/Madrid" date -d "$TARGET_DATE" +%u)
          IS_WEEKEND=false
          if [ "$DOW" = "6" ] || [ "$DOW" = "7" ]; then
            IS_WEEKEND=true
          fi

          HAS_CUSTODY=$(echo "$MARKERS" | jq -r --arg d "$TARGET_DATE" 'if .[$d] then (if (.[$d] | index("custody")) then "ON" else "OFF" end) else "OFF" end')
          if [ "$IS_WEEKEND" = "true" ]; then
            HAS_SCHOOL="OFF"
            HAS_WORK="OFF"
          else
            HAS_SCHOOL=$(echo "$MARKERS" | jq -r --arg d "$TARGET_DATE" 'if .[$d] then (if (.[$d] | index("school")) then "OFF" else "ON" end) else "ON" end')
            HAS_WORK=$(echo "$MARKERS" | jq -r --arg d "$TARGET_DATE" 'if .[$d] then (if (.[$d] | index("work")) then "OFF" else "ON" end) else "ON" end')
          fi

          MESSAGE="Ella: $HAS_CUSTODY | School: $HAS_SCHOOL | Work: $HAS_WORK"
          echo "Sending: $MESSAGE"

          curl -s \
            -H "Title: MyCalendar" \
            -H "Tags: sparkles" \
            -H "Priority: high" \
            -d "$MESSAGE" \
            https://ntfy.sh/mycalendar

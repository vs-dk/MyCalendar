name: Daily Calendar Notifications

on:
  schedule:
    # Use github.event.schedule to identify which notification to send.
    # Each cron fires ONCE — no duplicates for CET/CEST.
    # GitHub cron can delay up to ~60min, so we DON'T check the clock.
    # Times are set ~15min early to account for typical GH Actions delay.
    #
    # TESTING: summary at ~15:25 Madrid, pickup at ~15:35 Madrid
    - cron: '25 13 * * *'   # 13:25 UTC → 15:25 CEST
    - cron: '35 13 * * *'   # 13:35 UTC → 15:35 CEST
    # Evening summary (target: ~8:15pm Madrid)
    - cron: '0 18 * * *'    # 18:00 UTC → 20:00 CEST / 19:00 CET
  workflow_dispatch:
    inputs:
      type:
        description: 'Notification type'
        required: true
        default: 'summary'
        type: choice
        options:
          - morning
          - pickup
          - evening

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Determine notification type
        id: ntype
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.type }}" >> $GITHUB_OUTPUT
          else
            CRON="${{ github.event.schedule }}"
            case "$CRON" in
              "25 13 * * *")  echo "type=morning" >> $GITHUB_OUTPUT ;;
              "35 13 * * *")  echo "type=pickup"  >> $GITHUB_OUTPUT ;;
              "0 18 * * *")   echo "type=evening" >> $GITHUB_OUTPUT ;;
              *)              echo "type=unknown"  >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Send notification
        if: steps.ntype.outputs.type != 'unknown'
        run: |
          TYPE="${{ steps.ntype.outputs.type }}"
          TODAY=$(TZ="Europe/Madrid" date +%Y-%m-%d)
          TOMORROW=$(TZ="Europe/Madrid" date -d "+1 day" +%Y-%m-%d)

          echo "Notification type: $TYPE"
          echo "Today (Madrid): $TODAY"

          # Check if markers.json exists
          if [ ! -f data/markers.json ]; then
            echo "No markers file found, skipping"
            exit 0
          fi

          MARKERS=$(cat data/markers.json)

          # --- Pickup notification ---
          if [ "$TYPE" = "pickup" ]; then
            DOW=$(TZ="Europe/Madrid" date -d "$TODAY" +%u)
            IS_WEEKEND=false
            if [ "$DOW" = "6" ] || [ "$DOW" = "7" ]; then
              IS_WEEKEND=true
            fi

            HAS_CUSTODY=$(echo "$MARKERS" | jq -r --arg d "$TODAY" 'if .[$d] then (if (.[$d] | index("custody")) then "yes" else "no" end) else "no" end')
            HAS_SCHOOL_HOLIDAY=$(echo "$MARKERS" | jq -r --arg d "$TODAY" 'if .[$d] then (if (.[$d] | index("school")) then "yes" else "no" end) else "no" end')

            if [ "$IS_WEEKEND" = "false" ] && [ "$HAS_CUSTODY" = "yes" ] && [ "$HAS_SCHOOL_HOLIDAY" = "no" ]; then
              echo "Sending pickup notification"
              curl -s \
                -H "Title: MyCalendar" \
                -H "Tags: sparkles" \
                -H "Priority: high" \
                -d "Ella: pick up from school" \
                https://ntfy.sh/mycalendar
            else
              echo "No pickup needed today (weekend=$IS_WEEKEND, custody=$HAS_CUSTODY, school_holiday=$HAS_SCHOOL_HOLIDAY)"
            fi
            exit 0
          fi

          # --- Morning / Evening summary ---
          if [ "$TYPE" = "morning" ]; then
            TARGET_DATE="$TODAY"
          else
            TARGET_DATE="$TOMORROW"
          fi

          echo "Target date: $TARGET_DATE"

          DOW=$(TZ="Europe/Madrid" date -d "$TARGET_DATE" +%u)
          IS_WEEKEND=false
          if [ "$DOW" = "6" ] || [ "$DOW" = "7" ]; then
            IS_WEEKEND=true
          fi

          HAS_CUSTODY=$(echo "$MARKERS" | jq -r --arg d "$TARGET_DATE" 'if .[$d] then (if (.[$d] | index("custody")) then "ON" else "OFF" end) else "OFF" end')
          if [ "$IS_WEEKEND" = "true" ]; then
            HAS_SCHOOL="OFF"
            HAS_WORK="OFF"
          else
            HAS_SCHOOL=$(echo "$MARKERS" | jq -r --arg d "$TARGET_DATE" 'if .[$d] then (if (.[$d] | index("school")) then "OFF" else "ON" end) else "ON" end')
            HAS_WORK=$(echo "$MARKERS" | jq -r --arg d "$TARGET_DATE" 'if .[$d] then (if (.[$d] | index("work")) then "OFF" else "ON" end) else "ON" end')
          fi

          MESSAGE="Ella: $HAS_CUSTODY | School: $HAS_SCHOOL | Work: $HAS_WORK"
          echo "Sending: $MESSAGE"

          curl -s \
            -H "Title: MyCalendar" \
            -H "Tags: sparkles" \
            -H "Priority: high" \
            -d "$MESSAGE" \
            https://ntfy.sh/mycalendar

name: Daily Calendar Notifications

on:
  schedule:
    # Use github.event.schedule to identify which notification to send.
    # Each cron fires ONCE — no duplicates for CET/CEST.
    # GitHub cron can delay up to ~60min, so we DON'T check the clock.
    # Times are set ~15min early to account for typical GH Actions delay.
    #
    # Crons adjusted -1h for CEST (empirical GH offset). Review after Oct DST change.
    # Morning summary (target: ~8:15am CEST)
    - cron: '15 5 * * *'    # 05:15 UTC → ~08:15 CEST with observed +1h offset
    # Pickup from school (target: ~3:15pm CEST)
    - cron: '15 12 * * *'   # 12:15 UTC → ~15:15 CEST with observed +1h offset
    # Evening summary (target: ~8:15pm CEST)
    - cron: '15 17 * * *'   # 17:15 UTC → ~20:15 CEST with observed +1h offset
  workflow_dispatch:
    inputs:
      type:
        description: 'Notification type'
        required: true
        default: 'summary'
        type: choice
        options:
          - morning
          - pickup
          - evening

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Determine notification type
        id: ntype
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.type }}" >> $GITHUB_OUTPUT
          else
            CRON="${{ github.event.schedule }}"
            case "$CRON" in
              "15 5 * * *")   echo "type=morning" >> $GITHUB_OUTPUT ;;
              "15 12 * * *")  echo "type=pickup"  >> $GITHUB_OUTPUT ;;
              "15 17 * * *")  echo "type=evening" >> $GITHUB_OUTPUT ;;
              *)              echo "type=unknown"  >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Send notification
        if: steps.ntype.outputs.type != 'unknown'
        run: |
          TYPE="${{ steps.ntype.outputs.type }}"
          TODAY=$(TZ="Europe/Madrid" date +%Y-%m-%d)
          TOMORROW=$(TZ="Europe/Madrid" date -d "+1 day" +%Y-%m-%d)

          echo "Notification type: $TYPE"
          echo "Today (Madrid): $TODAY"

          # Check if markers.json exists
          if [ ! -f data/markers.json ]; then
            echo "No markers file found, skipping"
            exit 0
          fi

          MARKERS=$(cat data/markers.json)

          # --- Pickup notification ---
          if [ "$TYPE" = "pickup" ]; then
            DOW=$(TZ="Europe/Madrid" date -d "$TODAY" +%u)
            IS_WEEKEND=false
            if [ "$DOW" = "6" ] || [ "$DOW" = "7" ]; then
              IS_WEEKEND=true
            fi

            HAS_CUSTODY=$(echo "$MARKERS" | jq -r --arg d "$TODAY" 'if .[$d] then (if (.[$d] | index("custody")) then "yes" else "no" end) else "no" end')
            HAS_SCHOOL_HOLIDAY=$(echo "$MARKERS" | jq -r --arg d "$TODAY" 'if .[$d] then (if (.[$d] | index("school")) then "yes" else "no" end) else "no" end')

            if [ "$IS_WEEKEND" = "false" ] && [ "$HAS_CUSTODY" = "yes" ] && [ "$HAS_SCHOOL_HOLIDAY" = "no" ]; then
              echo "Sending pickup notification"
              curl -s \
                -H "Title: MyCalendar" \
                -H "Tags: sparkles" \
                -H "Priority: high" \
                -d "Ella: pick up from school 🔥🔥🔥" \
                https://ntfy.sh/mycalendar
            else
              echo "No pickup needed today (weekend=$IS_WEEKEND, custody=$HAS_CUSTODY, school_holiday=$HAS_SCHOOL_HOLIDAY)"
            fi
            exit 0
          fi

          # --- Morning / Evening summary ---
          if [ "$TYPE" = "morning" ]; then
            TARGET_DATE="$TODAY"
          else
            TARGET_DATE="$TOMORROW"
          fi

          echo "Target date: $TARGET_DATE"

          DOW=$(TZ="Europe/Madrid" date -d "$TARGET_DATE" +%u)
          IS_WEEKEND=false
          if [ "$DOW" = "6" ] || [ "$DOW" = "7" ]; then
            IS_WEEKEND=true
          fi

          HAS_CUSTODY=$(echo "$MARKERS" | jq -r --arg d "$TARGET_DATE" 'if .[$d] then (if (.[$d] | index("custody")) then "🟢" else "🔴" end) else "🔴" end')
          if [ "$IS_WEEKEND" = "true" ]; then
            HAS_SCHOOL="🔴"
            HAS_WORK="🔴"
          else
            HAS_SCHOOL=$(echo "$MARKERS" | jq -r --arg d "$TARGET_DATE" 'if .[$d] then (if (.[$d] | index("school")) then "🔴" else "🟢" end) else "🟢" end')
            HAS_WORK=$(echo "$MARKERS" | jq -r --arg d "$TARGET_DATE" 'if .[$d] then (if (.[$d] | index("work")) then "🔴" else "🟢" end) else "🟢" end')
          fi

          # Check for events (one-off or recurring) on target date
          EVENT_LINES=""
          if [ -f data/events.json ]; then
            EVENTS=$(cat data/events.json)
            TARGET_DAY=$(echo "$TARGET_DATE" | cut -d'-' -f3 | sed 's/^0//')

            # Build event lines with jq directly
            EVENT_LINES=$(echo "$EVENTS" | jq -r --arg d "$TARGET_DATE" --arg day "$TARGET_DAY" '
              ([.oneoff[] | select(.date == $d and .completed == false) | "🟠 " + .text] +
               [.recurring[] | select(.day == ($day | tonumber) and ((.completed // []) | index($d) | not)) | "🔴 " + .text])
              | join("\n")
            ')
          fi

          HAS_EVENT=""
          if [ -n "$EVENT_LINES" ]; then
            HAS_EVENT=" | Events: 🟡"
          fi

          MESSAGE=$(printf "%s%s" "Ella: $HAS_CUSTODY | S: $HAS_SCHOOL | W: $HAS_WORK${HAS_EVENT}" "$([ -n "$EVENT_LINES" ] && printf '\n%s' "$EVENT_LINES")")
          echo "Sending: $MESSAGE"

          curl -s \
            -H "Title: MyCalendar" \
            -H "Tags: sparkles" \
            -H "Priority: high" \
            -d "$MESSAGE" \
            https://ntfy.sh/mycalendar

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Personal calendar with holiday tracking and push notifications">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MyCalendar</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=28">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="calendar-header">
            <h1 id="month-year-label">March 2026</h1>
            <div id="nav-arrows">
                <button id="btn-prev" class="nav-btn" aria-label="Previous month">&#8249;</button>
                <button id="btn-next" class="nav-btn" aria-label="Next month">&#8250;</button>
            </div>
            <button id="btn-today" class="today-btn">TODAY</button>
        </header>

        <!-- Weekday labels -->
        <div id="weekday-labels">
            <span>M</span>
            <span>T</span>
            <span>W</span>
            <span>T</span>
            <span>F</span>
            <span class="weekend-gap-label"></span>
            <span class="weekend-label">S</span>
            <span class="weekend-label">S</span>
        </div>

        <!-- Calendar grid -->
        <div id="calendar-grid">
            <!-- Days will be rendered by JS -->
        </div>

        <!-- Bottom bar -->
        <div id="bottom-bar">
            <button id="btn-lock" class="lock-btn" aria-label="Toggle lock">
                <svg id="lock-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Locked icon (default) -->
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </button>
            <button id="btn-mode" class="mode-btn hidden" aria-label="Toggle mode">
                ELLA
            </button>
        </div>

        <!-- Desktop year view (4×3 grid of months) -->
        <div id="desktop-year-view">
            <div id="desktop-year-header">
                <button id="desktop-year-prev" class="desktop-year-nav-btn" aria-label="Previous year">&#8249;</button>
                <h1 id="desktop-year-label">2026</h1>
                <button id="desktop-year-next" class="desktop-year-nav-btn" aria-label="Next year">&#8250;</button>
            </div>
            <div id="desktop-months-grid">
                <!-- 12 mini-months rendered by JS -->
            </div>
        </div>

        <!-- Desktop Events FAB (left side) -->
        <button id="fab-events" class="fab-events-btn" aria-label="Toggle events panel">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="6" x2="21" y2="6"></line>
                <line x1="8" y1="12" x2="21" y2="12"></line>
                <line x1="8" y1="18" x2="21" y2="18"></line>
                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                <line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
        </button>

        <!-- Desktop FAB (floating action button) -->
        <div id="desktop-fab">
            <button id="fab-lock" class="fab-btn" aria-label="Toggle lock">
                <svg id="fab-lock-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </button>
            <div id="fab-panel" class="hidden">
                <button id="fab-mode" class="fab-mode-btn">ELLA</button>
            </div>
        </div>

        <!-- Events section (mobile only) -->
        <div id="events-section">
            <div id="events-title-row">
                <h2 id="events-title">Events</h2>
                <button id="btn-expand-events" class="event-collapse-btn">expand</button>
            </div>
            <div id="events-toolbar">
                <button id="btn-add-oo" class="event-add-btn">+ 1 Off</button>
                <button id="btn-add-rec" class="event-add-btn">+ REC</button>
                <button id="btn-filter" class="event-filter-btn">ALL</button>
                <button id="btn-expand" class="event-expand-btn">see more</button>
            </div>
            <div id="events-list">
                <!-- Event rows rendered by JS -->
            </div>

            <!-- One-off event modal -->
            <div id="modal-oo-overlay" class="modal-overlay hidden">
                <div class="modal-picker modal-event modal-event-grid">
                    <h3 class="modal-event-title">1 Off event</h3>
                    <!-- Year nav -->
                    <div id="oo-year-nav" class="picker-year-nav">
                        <button id="oo-year-prev" class="picker-nav-btn">&#8249;</button>
                        <span id="oo-year-label" class="picker-year-label">2026</span>
                        <button id="oo-year-next" class="picker-nav-btn">&#8250;</button>
                    </div>
                    <!-- Month grid 3×4 -->
                    <div id="oo-month-grid" class="picker-month-grid">
                        <!-- 12 month buttons rendered by JS -->
                    </div>
                    <!-- Day grid 7 cols -->
                    <div id="oo-day-grid" class="picker-day-grid">
                        <!-- 31 day buttons rendered by JS -->
                    </div>
                    <input id="oo-text" type="text" class="event-input" placeholder="Description (optional)" maxlength="30">
                    <div class="modal-event-actions">
                        <button id="oo-cancel" class="event-btn event-btn-cancel">Cancel</button>
                        <button id="oo-save" class="event-btn event-btn-save">Save</button>
                    </div>
                </div>
            </div>

            <!-- Recurring event modal -->
            <div id="modal-rec-overlay" class="modal-overlay hidden">
                <div class="modal-picker modal-event modal-event-grid">
                    <h3 class="modal-event-title">Recurring event</h3>
                    <!-- Day grid 7 cols -->
                    <div id="rec-day-grid" class="picker-day-grid">
                        <!-- 31 day buttons rendered by JS -->
                    </div>
                    <span class="modal-event-freq">of every month</span>
                    <input id="rec-text" type="text" class="event-input" placeholder="Description (optional)" maxlength="30">
                    <div class="modal-event-actions">
                        <button id="rec-cancel" class="event-btn event-btn-cancel">Cancel</button>
                        <button id="rec-save" class="event-btn event-btn-save">Save</button>
                    </div>
                </div>
            </div>

            <!-- Event detail modal (view/edit) -->
            <div id="modal-event-detail-overlay" class="modal-overlay hidden">
                <div class="modal-picker modal-event">
                    <h3 id="detail-title" class="modal-event-title"></h3>
                    <p id="detail-date" class="modal-event-detail-date"></p>
                    <p id="detail-text" class="modal-event-detail-text"></p>
                    <div class="modal-event-actions">
                        <button id="detail-delete" class="event-btn event-btn-delete">Delete</button>
                        <button id="detail-done" class="event-btn event-btn-done">Done</button>
                        <button id="detail-close" class="event-btn event-btn-cancel">Close</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Month/Year picker modal -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div id="modal-picker" class="modal-picker">
                <div id="modal-year-nav">
                    <button id="modal-year-prev" class="modal-nav-btn" aria-label="Previous year">&#8249;</button>
                    <span id="modal-year-label">2026</span>
                    <button id="modal-year-next" class="modal-nav-btn" aria-label="Next year">&#8250;</button>
                </div>
                <div id="modal-months-grid">
                    <!-- 12 month buttons rendered by JS -->
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=20"></script>
</body>
</html>
